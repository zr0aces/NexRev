# NexRev GHCR Deployment Sample
# This file is intended as a reference for deploying NexRev using pre-built images from GitHub Container Registry.
# 
# Usage:
# 1. Copy this file to the root of the project.
# 2. Update the image tags if you want a specific version.
#    By default, this uses the ${NEXREV_VERSION} variable from your .env file, 
#    which is automatically kept in sync with the root VERSION file.
# 3. Ensure your .env file is configured correctly.
# 4. Run `docker compose up -d`

services:
  backend:
    image: ghcr.io/zr0aces/nexrev-backend:${NEXREV_VERSION:-latest}
    container_name: nexrev-backend
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/app/data
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - AI_MODEL=${AI_MODEL:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LITELLM_BASE_URL=${LITELLM_BASE_URL:-http://localhost:4000}
      - LITELLM_MODEL=${LITELLM_MODEL:-}
      - LITELLM_MODEL_PREFIX=${LITELLM_MODEL_PREFIX:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_NAME=${TELEGRAM_BOT_NAME}
      - APP_URL=${APP_URL:-http://localhost:8088}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8088}
      - LOG_LEVEL=${LOG_LEVEL:-warn}
      - REMINDER_TIMEZONE=${REMINDER_TIMEZONE:-Asia/Bangkok}
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID:-localhost}
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME:-NexRev}
      - WEBAUTHN_ORIGIN=${WEBAUTHN_ORIGIN:-http://localhost:8088}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    image: ghcr.io/zr0aces/nexrev-frontend:${NEXREV_VERSION:-latest}
    container_name: nexrev-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: nexrev-nginx
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
