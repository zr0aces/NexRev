<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Dashboard</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div id="app">

  <nav class="nav">
    <span class="nav-title">&#x25A0; Sales Dashboard</span>
    <div class="nav-tabs">
      <button class="nav-tab active" data-panel="digest">Today</button>
      <button class="nav-tab" data-panel="pipeline">Pipeline</button>
      <button class="nav-tab" data-panel="log">Activity Log</button>
    </div>
    <div class="nav-actions">
      <button class="btn btn-sm" id="btn-export-md">Export .md</button>
      <button class="btn btn-sm" id="btn-export-json">Backup JSON</button>
      <button class="btn btn-sm btn-primary" id="btn-add">+ Add Opportunity</button>
    </div>
  </nav>

  <!-- TODAY PANEL -->
  <div id="panel-digest" class="panel active">
    <div class="metrics-row" id="metrics-row"></div>
    <div class="card">
      <div class="section-label">Pending actions &amp; follow-ups</div>
      <div id="digest-list"></div>
    </div>
  </div>

  <!-- PIPELINE PANEL -->
  <div id="panel-pipeline" class="panel">
    <div class="pipeline-toolbar">
      <input class="search-bar" type="text" placeholder="Search accounts or contacts..." id="search-input">
      <select id="sort-select" class="select-sm">
        <option value="name">Sort: Name</option>
        <option value="value">Sort: Value</option>
        <option value="due">Sort: Follow-up date</option>
        <option value="stage">Sort: Stage</option>
      </select>
    </div>
    <div class="stage-filter" id="stage-filter"></div>
    <div class="pipeline-split">
      <div class="opp-list-col">
        <div class="opp-list" id="opp-list"></div>
      </div>
      <div class="detail-col" id="detail-panel">
        <div class="empty-state" style="padding-top:4rem">
          <div class="empty-icon">&#x25A1;</div>
          <div>Select an opportunity to view details</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ACTIVITY LOG PANEL -->
  <div id="panel-log" class="panel">
    <div class="card">
      <div class="section-label">All activity — newest first</div>
      <div id="global-log"></div>
    </div>
  </div>

</div>

<!-- ADD / EDIT MODAL -->
<div id="add-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Add opportunity</span>
      <button class="modal-close" id="modal-close-btn">&times;</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Account name *</label>
        <input id="f-name" type="text" placeholder="Acme Corp">
      </div>
      <div class="form-group">
        <label>Contact name</label>
        <input id="f-contact" type="text" placeholder="Jane Smith">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Deal value (USD)</label>
        <input id="f-value" type="number" placeholder="50000">
      </div>
      <div class="form-group">
        <label>Stage</label>
        <select id="f-stage">
          <option>Prospecting</option>
          <option>Qualification</option>
          <option>Discovery</option>
          <option>Demo</option>
          <option>Proposal</option>
          <option>Negotiation</option>
          <option>Closed Won</option>
          <option>Closed Lost</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Close date</label>
        <input id="f-close" type="date">
      </div>
      <div class="form-group">
        <label>Next follow-up date</label>
        <input id="f-followup" type="date">
      </div>
    </div>
    <div class="form-group">
      <label>Next step</label>
      <input id="f-nextstep" type="text" placeholder="e.g. Send proposal draft by Friday">
    </div>
    <div class="form-group">
      <label>Initial notes</label>
      <textarea id="f-notes" placeholder="Context, background, key contacts..."></textarea>
    </div>
    <input type="hidden" id="f-edit-id">
    <div class="modal-footer">
      <button class="btn" id="modal-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn">Save</button>
    </div>
  </div>
</div>

<script src="assets/app.js"></script>
</body>
</html>
